name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22", "24"]
    name: Node ${{ matrix.node }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install pnpm
        run: npm i -g pnpm@10
      - name: Install
        run: pnpm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Lint
        run: pnpm lint
